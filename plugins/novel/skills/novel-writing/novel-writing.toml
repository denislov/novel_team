name = "novel-writing"
description = "网络小说创作与结构化项目管理技能，适用于写章节、做大纲、建人物、维护时间线、审核章节以及长期连载中的状态管理。当用户要写小说、改小说、评小说、建人设、写大纲或搭建小说工作流时触发。"
sandbox_mode = "workspace-write"
developer_instructions = '''
# 网络小说创作技能

## 定位

这个技能分两层工作：

1. **写作原则层**：负责文风、节奏、代入感、去 AI 味。
2. **项目结构层**：负责把长篇创作拆成稳定的 `.novel/` 产物链。

如果任务是长期连载、项目化创作、批量章节规划，不要只输出零散文本，优先维护结构化文档。

## 标准产物链

长期项目优先维护以下文件：

1. `PROJECT.md`：全书契约，定义世界观、主角、主线、禁忌。
2. `CHARACTERS.md`：人物总表，记录当前状态和关系。
3. `TIMELINE.md`：时间账，避免时间线吃书。
4. `ROADMAP.md`：卷结构和阶段推进。
5. `STATE.md`：当前进度、伏笔、下一步。
6. `CHARACTER-CARD.md`：单个人物的深度档案。
7. `CHAPTER-OUTLINE.md`：章节蓝图。
8. `CHAPTER.md`：章节正文。
9. `REVIEW.md`：审核、润色、复盘的统一报告。

模板位置：

- `${CLAUDE_PLUGIN_ROOT}/templates/PROJECT.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/CHARACTERS.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/TIMELINE.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/ROADMAP.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/STATE.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/CHARACTER-CARD.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/CHAPTER-OUTLINE.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/CHAPTER.md`
- `${CLAUDE_PLUGIN_ROOT}/templates/REVIEW.md`

## 工作顺序

### 新建项目

1. 先用 `references/novel-settings-template.md` 收集设定。
2. 再落 `PROJECT.md`。
3. 同步建立 `CHARACTERS.md`、`TIMELINE.md`、`ROADMAP.md`。
4. 建 `STATE.md` 作为创作内存。

### 写章节

1. 先读 `PROJECT.md`、`CHARACTERS.md`、`TIMELINE.md`、`STATE.md`。
2. 用 `CHAPTER-OUTLINE.md` 规划本章。
3. 再写 `CHAPTER.md`。
4. 写完后回写 `STATE.md`、`TIMELINE.md`、`CHARACTERS.md`。
5. 用 `REVIEW.md` 做审核或润色结论。

### 建人物

1. 在 `CHARACTERS.md` 登记人物摘要。
2. 对重要人物创建 `CHARACTER-CARD.md`。
3. 人物立场、关系、秘密变化后，同步更新总表和人物卡。

## 核心原则

- **Show, don't tell**：用行动和细节证明，不靠旁白解释。
- **盐溶于汤**：价值观藏在选择里，不喊口号。
- **全员在线**：人物、时间、因果都必须连续。
- **配角不是工具人**：配角要有自己的利益和判断。
- **节奏张弛有度**：重要场景展开，过渡场景压缩。
- **设定先于爽点**：任何高潮都不能打穿既有规则。

## 文风要求

- 多用动词和名词，少用空洞形容词。
- 长短句混用，避免机械重复句式。
- 场景尽量有五感，尤其是触觉、气味、声音。
- 对话要带人物身份，不要所有人说话一个味。
- 少写总结式说教，改成行为、表情、动作、停顿。

## 自检清单

- [ ] 这一章是否推进了主线或人物弧线？
- [ ] 人物行为是否符合“经历 + 利益 + 性格底色”？
- [ ] 时间、季节、年龄、事件是否能对上？
- [ ] 是否存在机械降神、反派降智、流水账？
- [ ] 章末是否留下明确钩子？
- [ ] 是否有需要同步到 `STATE.md`、`TIMELINE.md`、`CHARACTERS.md` 的变化？

## 按需加载的参考资料

- `references/creative-principles.md`：创作原则和节奏细化
- `references/immersion-techniques.md`：代入感与细节处理
- `references/common-pitfalls.md`：常见雷点与排雷
- `references/novel-settings-template.md`：快速收集项目设定

## 研究规则

涉及以下内容时必须核实，不要凭印象写：

- 真实历史事件
- 真实人物与机构
- 年代物价、制度、法规
- 金融、法律、医学、军事等专业细节

研究结果优先沉淀到 `.novel/research/`，再回写到 `PROJECT.md` 或 `TIMELINE.md`。
'''
